<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagens de flores</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: #f4f4f4;
        }

        .galeria {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 600px;
        }

        .imagem-container {
            position: relative;
            width: 250px;
            height: 250px;
            cursor: pointer;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .imagem-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 0.4s ease-in-out;
        }
        .imagem-container .img-hover {
            opacity: 0;
            z-index: 1;
        }
        {
            opacity: 1;
            z-index: 2;
        }

        .imagem-container:hover .img-padrao {
            opacity: 0;
        }

        .imagem-container:hover .img-hover {
            opacity: 1;
        }
    </style>
</head>
<body>


<div class="galeria">

    <div class="imagem-container">
        <img src=https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR3UQvrAjEwn5nvdNbA9X5rFrvnimaGdqcUmg&s" class="img-padrao" alt="Imagem 1 Padrão">
        <img src="  https://images.unsplash.com/photo-1566669086984-077347c1f4bb?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8ZmxvciUyMGJvbml0YXxlbnwwfHwwfHx8MA%3D%3Dclass="img-hover" alt="Imagem 1 Trocada">
    </div>

    <div class="imagem-container">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTzxPa8pwvYqO4UOAunLsXEu_izml1XzpfPVA&s" class="img-padrao" alt="Imagem 2 Padrão">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRJRL_H7rcmsnZeotL4gmpSTGkWIL95WVXqbw&s" class="img-hover" alt="Imagem 2 Trocada">
    </div>

    <div class="imagem-container">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTHTn-P0JdstMKXLJ9EDklWL-rU1yRMqH-wCg&s" class="img-padrao" alt="Imagem 3 Padrão">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRhZ73Wv14pESmKL_PMgTYoyZyhtIZedj8kIQ&s" class="img-hover" alt="Imagem 3 Trocada">
    </div>
</div>

</body>
</html>
